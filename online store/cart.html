<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart | Hayaa Luxe</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar" id="navbar">
        <div class="logo">
            <img src="images/logo.png" alt="Hayaa Luxe" onerror="this.style.display='none'; document.getElementById('text-logo').style.display='block';" style="height: 40px; max-width: 150px;">
            <span id="text-logo" style="display: none; font-family: var(--font-heading); font-size: 2rem; font-weight: 700; color: var(--primary-color);">Hayaa Luxe.</span>
        </div>
        <ul class="nav-links" id="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html">Shop</a></li>
            <li><a href="category.html">Categories</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
        <div class="nav-icons">
            <a href="products.html"><i class="fa-solid fa-search"></i></a>
            <a href="#"><i class="fa-regular fa-heart"></i></a>
            <a href="cart.html" class="active"><i class="fa-solid fa-shopping-bag"></i><span class="cart-count">0</span></a>
            <div class="menu-toggle" id="mobile-menu"><i class="fa-solid fa-bars"></i></div>
        </div>
    </nav>

    <!-- Page Header -->
    <header class="page-header">
        <div class="container">
            <h1 class="page-title">Shopping Cart</h1>
            <div class="breadcrumb">
                <a href="index.html">Home</a> &gt; <span>Cart</span>
            </div>
        </div>
    </header>

    <!-- Cart Section -->
    <section class="section-padding container">
        <div class="shop-layout" style="grid-template-columns: 2fr 1fr;">
            <!-- Cart Items -->
            <div>
                <table class="cart-table">
                    <thead>
                        <tr>
                            <th>Product</th>
                            <th>Price</th>
                            <th>Quantity</th>
                            <th>Subtotal</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="cart-table-body">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <a href="products.html" class="btn btn-outline"><i class="fa-solid fa-arrow-left"></i> Continue Shopping</a>
                </div>
            </div>

            <!-- Cart Summary -->
            <div>
                <div class="cart-summary">
                    <h3 style="margin-bottom: 1.5rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem;">Order Summary</h3>
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span id="cart-subtotal" style="color: var(--text-dark); font-weight: 500;">Rs. 0</span>
                    </div>
                    <div class="summary-row">
                        <span>Shipping</span>
                        <span style="color: var(--text-dark); font-weight: 500;">Rs. 250</span>
                    </div>
                    <div class="summary-total">
                        <span>Total</span>
                        <span id="cart-total">Rs. 0</span>
                    </div>
                    <button class="btn btn-primary" style="width: 100%; margin-top: 2rem;">Proceed to Checkout</button>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom" style="border-top: none;">
                <p>&copy; 2026 Hayaa Luxe Fashion. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
