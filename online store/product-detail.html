<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Hayaa Luxe</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar" id="navbar">
        <div class="logo">
            <img src="images/logo.png" alt="Hayaa Luxe" onerror="this.style.display='none'; document.getElementById('text-logo').style.display='block';" style="height: 40px; max-width: 150px;">
            <span id="text-logo" style="display: none; font-family: var(--font-heading); font-size: 2rem; font-weight: 700; color: var(--primary-color);">Hayaa Luxe.</span>
        </div>
        <ul class="nav-links" id="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html">Shop</a></li>
            <li><a href="category.html">Categories</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
        <div class="nav-icons">
            <a href="products.html"><i class="fa-solid fa-search"></i></a>
            <a href="#"><i class="fa-regular fa-heart"></i></a>
            <a href="cart.html"><i class="fa-solid fa-shopping-bag"></i><span class="cart-count">0</span></a>
            <div class="menu-toggle" id="mobile-menu"><i class="fa-solid fa-bars"></i></div>
        </div>
    </nav>

    <!-- Page Header -->
    <header class="page-header" style="padding: 2rem 0; background: var(--secondary-bg);">
        <div class="container">
            <div class="breadcrumb" style="text-align: left;">
                <a href="index.html">Home</a> &gt; <a href="products.html">Shop</a> &gt; <span id="detail-category-crumb">Product</span>
            </div>
        </div>
    </header>

    <!-- Product Detail -->
    <section class="section-padding container" id="product-detail-container">
        <div class="product-detail-wrapper">
            <!-- Product Images -->
            <div class="product-gallery">
                <img src="images/Luxury Silk Abaya.jpg" alt="Product" class="main-image" id="detail-image" onerror="this.src='https://via.placeholder.com/800?text=Hayaa+Luxe'">
            </div>

            <!-- Product Info -->
            <div class="product-info-detail">
                <p class="product-category" id="detail-category" style="font-size: 1rem;">Category</p>
                <h1 class="detail-title" id="detail-title">Product Name</h1>
                <div style="margin-bottom: 1rem; color: #ffb800;">
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star-half-stroke"></i>
                    <span style="color: var(--text-muted); font-size: 0.9rem; margin-left: 0.5rem;">(Customer Reviews)</span>
                </div>
                <p class="detail-price" id="detail-price">Rs. 0</p>
                
                <p class="detail-desc" id="detail-desc">
                    Product Description
                </p>

                <div class="quantity-wrap">
                    <div class="quantity-control">
                        <button onclick="let q=document.getElementById('qty'); if(q.value>1) q.value--;">-</button>
                        <input type="number" id="qty" value="1" min="1">
                        <button onclick="let q=document.getElementById('qty'); q.value++;">+</button>
                    </div>
                    <span class="text-muted">In Stock</span>
                </div>

                <div class="action-buttons">
                    <button class="btn btn-primary btn-full" id="detail-add-cart"><i class="fa-solid fa-cart-plus"></i> Add to Cart</button>
                    <a href="cart.html" class="btn btn-outline btn-full" style="text-align: center; text-decoration: none;">Buy Now</a>
                    <button class="action-btn" style="border: 1px solid var(--border-color);"><i class="fa-regular fa-heart"></i></button>
                </div>

                <div style="margin-top: 3rem; border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
                    <p style="margin-bottom: 0.5rem;"><strong>Brand:</strong> Hayaa Luxe</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom" style="border-top: none;">
                <p>&copy; 2026 Hayaa Luxe Fashion. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
