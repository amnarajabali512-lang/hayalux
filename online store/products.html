<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop All Products | Hayaa Luxe</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body data-page="shop">

    <!-- Navbar -->
    <nav class="navbar" id="navbar">
        <div class="logo">
            <img src="images/logo.png" alt="Hayaa Luxe" onerror="this.style.display='none'; document.getElementById('text-logo').style.display='block';" style="height: 40px; max-width: 150px;">
            <span id="text-logo" style="display: none; font-family: var(--font-heading); font-size: 2rem; font-weight: 700; color: var(--primary-color);">Hayaa Luxe.</span>
        </div>
        <ul class="nav-links" id="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html" class="active">Shop</a></li>
            <li><a href="category.html">Categories</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
        <div class="nav-icons">
            <a href="#"><i class="fa-solid fa-search"></i></a>
            <a href="#"><i class="fa-regular fa-heart"></i></a>
            <a href="cart.html"><i class="fa-solid fa-shopping-bag"></i><span class="cart-count">0</span></a>
            <div class="menu-toggle" id="mobile-menu"><i class="fa-solid fa-bars"></i></div>
        </div>
    </nav>

    <!-- Page Header -->
    <header class="page-header">
        <div class="container">
            <h1 class="page-title">Shop Collection</h1>
            <p class="page-desc" style="max-width: 700px; margin: 1rem auto; color: var(--text-muted);"></p>
            <div class="breadcrumb">
                <a href="index.html">Home</a> &gt; <span>Shop</span>
            </div>
        </div>
    </header>

    <!-- Shop Section -->
    <section class="section-padding container">
        <div class="shop-topbar">
            <p>Showing amazing products</p>
            <div class="search-bar">
                <i class="fa-solid fa-search text-muted"></i>
                <input type="text" placeholder="Search products...">
                <button class="btn btn-primary" style="padding: 0.5rem 1rem;">Search</button>
            </div>
        </div>

        <div class="shop-layout">
            <!-- Sidebar / Filters -->
            <aside class="shop-sidebar">
                <div class="filter-widget">
                    <h4 class="filter-title">Categories</h4>
                    <ul class="filter-list">
                        <li><label><input type="checkbox" class="filter-category" value="All" checked> All Products</label></li>
                        <li><label><input type="checkbox" class="filter-category" value="Abayas"> Abayas</label></li>
                        <li><label><input type="checkbox" class="filter-category" value="Shoes"> Shoes</label></li>
                        <li><label><input type="checkbox" class="filter-category" value="Bags"> Bags</label></li>
                        <li><label><input type="checkbox" class="filter-category" value="Hijab"> Hijabs</label></li>
                        <li><label><input type="checkbox" class="filter-category" value="Watches"> Watches</label></li>
                    </ul>
                </div>
                
                <div class="filter-widget">
                    <h4 class="filter-title">Price Range</h4>
                    <ul class="filter-list">
                        <li><label><input type="radio" name="price"> Under Rs. 3,000</label></li>
                        <li><label><input type="radio" name="price"> Rs. 3,000 - Rs. 5,000</label></li>
                        <li><label><input type="radio" name="price"> Rs. 5,000 - Rs. 10,000</label></li>
                        <li><label><input type="radio" name="price"> Over Rs. 10,000</label></li>
                    </ul>
                </div>
                
                <button class="btn btn-outline" style="width: 100%;"><i class="fa-solid fa-filter"></i> Apply Filters</button>
            </aside>

            <!-- Product Grid dynamically populated -->
            <div class="product-grid" id="shop-products">
                
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom" style="border-top: none;">
                <p>&copy; 2026 Hayaa Luxe Fashion. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
